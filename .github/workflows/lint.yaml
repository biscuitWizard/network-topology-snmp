name: Lint

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile Python files
        run: python -m compileall custom_components scripts

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Ruff check
        run: ruff check custom_components scripts
